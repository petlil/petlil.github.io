<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter Liljenström</title>

  <!-- Cormorant Garant — display serif for section navigation -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/nav.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/debug.css">
  <link rel="stylesheet" href="css/components/identity.css">
  <link rel="stylesheet" href="css/components/section-cards.css?v=2">

  <!-- p5.js — must load before app.js; instance mode used throughout -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>

  <!-- Full-screen background canvas — sits behind everything via z-index -->
  <div id="bg" aria-hidden="true"></div>

  <nav id="nav"></nav>

  <!-- Corner identity badge -->
  <div id="identity"></div>

  <!-- Section panels are created dynamically by app.js from js/sections/index.js -->
  <main id="app"></main>

  <div id="modal" aria-hidden="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
