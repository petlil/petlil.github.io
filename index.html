<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter Liley</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎷</text></svg>">

  <!-- Cormorant Garant — display serif for section navigation (self-hosted) -->
  <link rel="stylesheet" href="css/fonts.css">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components/nav.css">
  <link rel="stylesheet" href="css/components/modal.css">
  <link rel="stylesheet" href="css/components/debug.css">
  <link rel="stylesheet" href="css/components/identity.css">
  <link rel="stylesheet" href="css/components/section-cards.css?v=2">
  <link rel="stylesheet" href="css/mobile.css">

  <!-- p5.js — must load before app.js; instance mode used throughout -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>

  <!-- Full-screen background canvas — sits behind everything via z-index -->
  <div id="bg" aria-hidden="true"></div>

  <nav id="nav"></nav>

  <!-- Corner identity badge -->
  <div id="identity"></div>

  <!-- Section panels are created dynamically by app.js from js/sections/index.js -->
  <main id="app"></main>

  <div id="modal" aria-hidden="true"></div>

  <!-- Mobile close button — shown in place of the ff-debug-toggle when a panel is open -->
  <button id="mobile-close" aria-label="Close panel">✕</button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
